<!DOCTYPE html>
<html lang="mr">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>गोवा बाजार</title>

<meta name="theme-color" content="#138808">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="app">

<header class="detail-header">

<button onclick="history.back()" class="back-btn">←</button>

<h2 id="productName">उत्पादन</h2>

<button class="fav-btn">🤍</button>

</header>

<section class="top-card">

<div class="top-left">

<img
id="productImage"
src="assets/no-image.png"
class="detail-image"
alt="Product">

</div>

<div class="top-right">

<p class="title-small">
आजचा भाव
</p>

<h1 id="todayPrice">
₹0
</h1>

<p id="priceChange" class="price-green">
₹0 (0%)
</p>

<p class="updated">
शेवटचे अपडेट :
<span id="lastUpdated">
Loading...
</span>
</p>

</div>

</section>

<section class="stats-row">

<div class="stat-box">

<p>कालचा भाव</p>

<h3 id="yesterdayPrice">
₹0
</h3>

</div>

<div class="stat-box">

<p>कमाल भाव</p>

<h3 id="highestPrice">
₹0
</h3>

</div>

<div class="stat-box">

<p>किमान भाव</p>

<h3 id="lowestPrice">
₹0
</h3>

</div>

</section>

<section class="filter-row">

<button>७ दिवस</button>

<button>३० दिवस</button>

<button>६ महिने</button>

<button>१ वर्ष</button>

<button>सर्व</button>

</section>

<section class="graph-card">

<h3>
भाव इतिहास (₹/किलो)
</h3>

<canvas id="priceChart"></canvas>

</section>

<section class="info-card">

<h3>
अधिक माहिती
</h3>

<div class="info-row">

<span>सरासरी भाव</span>

<strong id="averagePrice">
₹0
</strong>

</div>

<div class="info-row">

<span>आजचा बदल</span>

<strong id="todayChange">
₹0
</strong>

</div>

<div class="info-row">

<span>शेतकरी भाव</span>

<strong id="farmerPrice">
₹0
</strong>

</div>

<div class="info-row">

<span>वर्ग</span>

<strong id="productCategory">
Loading...
</strong>

</div>

</section>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script type="module" src="js/product.js"></script>

</body>

</html>
