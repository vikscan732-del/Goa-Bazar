<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Vegetable Prices</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="app">

<div class="header">

<div class="header-top">
<div class="header-text">
<h1>🥬 Vegetable Prices</h1>
<p>Goa Horticulture Corporation Ltd.</p>
</div>
</div>

<div class="date-card">
<div>
<div class="label">Last Updated</div>
<h3 id="updateTime">Loading...</h3>
</div>

<div class="calendar">🥕</div>
</div>

</div>

<div class="source-card">

<div class="source-logo">
🥬
</div>

<div class="source-info">

<h3>Goa Horticulture Corporation Ltd.</h3>

<p>Official Daily Vegetable Prices</p>

<div class="source-meta">

<span id="vegDate">--</span>

<span id="vegCount">0 Items</span>

</div>

</div>

</div>

<div class="search-section">

<div class="search-box">

<input
type="text"
id="searchInput"
placeholder="Search Vegetable..."
onkeyup="searchVegetables()">

<button>
🔍
</button>

</div>

</div>

<div class="stats-grid">

<div class="stat-box">
<p>Total</p>
<h3 id="totalVeg">0</h3>
</div>

<div class="stat-box">
<p>Average</p>
<h3 id="avgPrice">₹0</h3>
</div>

<div class="stat-box">
<p>Highest</p>
<h3 id="highPrice">₹0</h3>
</div>

<div class="stat-box">
<p>Lowest</p>
<h3 id="lowPrice">₹0</h3>
</div>

</div>

<div class="veg-title">
Today's Vegetables
</div>

<div
id="vegetableList"
class="product-container">

<div class="loading-box">

<div class="loader"></div>

<p>Loading prices...</p>

</div>

</div>

<nav class="bottom-nav">

<a href="index.html">
🏠
<span>Home</span>
</a>

<a
href="favourite.html"
class="active">
🥬
<span>Vegetables</span>
</a>

<a href="info.html">
ℹ️
<span>Info</span>
</a>

</nav>

</div>

<script src="js/vegetables.js"></script>

</body>
</html>
