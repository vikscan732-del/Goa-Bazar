<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Vegetables</title>
<link rel="stylesheet" href="css/style.css">
<style>
body{font-family:Arial,sans-serif;background:#f5f5f5;margin:0}
.header{background:#138808;color:#fff;padding:18px}
.header h1{margin:0}
.header p{margin:6px 0 0}
.wrap{padding:15px}
.card{background:#fff;border-radius:14px;padding:15px;margin-bottom:14px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.stat{text-align:center;background:#fff;border-radius:10px;padding:10px}
.list .item{display:flex;justify-content:space-between;align-items:center;background:#fff;border-radius:12px;padding:14px;margin:10px 0}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;display:flex;justify-content:space-around;padding:10px 0;border-top:1px solid #ddd}
.bottom-nav a{text-decoration:none;color:#555}
.bottom-nav .active{color:#138808;font-weight:bold}
</style>
</head>
<body>
<header class="header">
<h1>🥬 Vegetables</h1>
<p>Daily Market Price</p>
</header>

<div class="wrap">
<div class="card">
<b>🌿 Goa Horticulture Corporation Ltd.</b><br>
Government of Goa<br><br>
📅 <span id="priceDate">Loading...</span> &nbsp;&nbsp; 🕒 <span id="updateTime">Loading...</span>
</div>

<div class="stats">
<div class="stat">⬆️<br><span id="inc">0</span></div>
<div class="stat">⬇️<br><span id="dec">0</span></div>
<div class="stat">➖<br><span id="same">0</span></div>
<div class="stat">📦<br><span id="total">0</span></div>
</div>

<h3>Today's Vegetable Prices</h3>
<div class="list" id="vegList"></div>
</div>

<nav class="bottom-nav">
<a href="index.html">🏠<br>Home</a>
<a class="active" href="favourite.html">🥬<br>Vegetables</a>
<a href="info.html">ℹ️<br>Info</a>
</nav>

<script>
fetch('prices.json').then(r=>r.json()).then(data=>{
document.getElementById('priceDate').textContent=data.priceDate||'-';
document.getElementById('updateTime').textContent=data.updatedAt||'-';
const arr=data.vegetables||[];
document.getElementById('total').textContent=arr.length;
const list=document.getElementById('vegList');
arr.forEach(v=>{
list.innerHTML+=`<div class="item"><div>${v.emoji||'🥬'} ${v.name}</div><b>₹${v.price}/${v.unit||'kg'}</b></div>`;
});
}).catch(()=>{
document.getElementById('vegList').innerHTML="<div class='card'>prices.json not found.</div>";
});
</script>
</body></html>
