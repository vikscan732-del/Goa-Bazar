<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Vegetables</title>
<link rel="stylesheet" href="css/style.css">
<style>
body{margin:0;font-family:Arial;background:#f3f5f7}
header{background:#138808;color:#fff;padding:18px}
.card{background:#fff;margin:16px;border-radius:14px;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:16px}
.stat{background:#fff;padding:12px;border-radius:10px;text-align:center}
.item{display:flex;justify-content:space-between;background:#fff;margin:10px 16px;padding:14px;border-radius:12px}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;display:flex;justify-content:space-around;background:#fff;padding:10px;border-top:1px solid #ddd}
.active{color:#138808;font-weight:bold}
</style>
</head>
<body>
<header>
<h2>🥬 Vegetables</h2>
<div>Daily Market Price</div>
</header>

<div class="card">
<b>🌿 Goa Horticulture Corporation Ltd.</b><br>
Government of Goa<br><br>
📅 <span id="d">Loading...</span> &nbsp; 🕒 <span id="t">Loading...</span>
</div>

<div class="stats">
<div class="stat">⬆️<br><span id="inc">0</span></div>
<div class="stat">⬇️<br><span id="dec">0</span></div>
<div class="stat">➖<br><span id="same">0</span></div>
<div class="stat">📦<br><span id="total">0</span></div>
</div>

<div id="list"></div>

<nav class="bottom-nav">
<a href="index.html">🏠<br>Home</a>
<a class="active" href="favourite.html">🥬<br>Vegetables</a>
<a href="info.html">ℹ️<br>Info</a>
</nav>

<script>
fetch("prices.json").then(r=>r.json()).then(data=>{
d.textContent=data.priceDate||"-";
t.textContent=data.updatedAt||"-";
const arr=data.vegetables||[];
total.textContent=arr.length;
arr.forEach(v=>{
list.innerHTML+=`<div class="item"><span>${v.emoji||"🥬"} ${v.name}</span><b>₹${v.price}/${v.unit||"kg"}</b></div>`;
});
});
</script>
</body>
</html>
