<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Vegetable Details</title>

<link rel="stylesheet" href="css/style.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f6f9;
}

.header{
background:#148814;
padding:18px;
color:#fff;
}

.back{
color:#fff;
text-decoration:none;
font-size:18px;
display:inline-block;
margin-bottom:15px;
}

.hero{

background:#fff;
margin:18px;
padding:22px;
border-radius:22px;
box-shadow:0 8px 20px rgba(0,0,0,.08);

}

.emoji{
font-size:58px;
}

.name{
font-size:34px;
font-weight:bold;
margin-top:10px;
}

.price{

font-size:42px;
font-weight:bold;
color:#148814;
margin-top:15px;

}

.unit{

font-size:22px;
color:#555;

}

.change{

margin-top:15px;
font-size:22px;
font-weight:bold;

}

.status{

font-size:18px;
margin-top:8px;

}

.updated{

margin-top:18px;
color:#666;

}

.grid{

display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
padding:18px;

}

.card{

background:#fff;
padding:20px;
border-radius:18px;
box-shadow:0 5px 18px rgba(0,0,0,.08);
text-align:center;

}

.card h3{

font-size:17px;
color:#555;
margin-bottom:10px;

}

.card p{

font-size:28px;
font-weight:bold;
color:#148814;

}

.section{

padding:18px;

}

.section h2{

color:#148814;
margin-bottom:15px;

}

.chart{

height:260px;
background:#fff;
border-radius:20px;
box-shadow:0 5px 18px rgba(0,0,0,.08);

display:flex;
align-items:center;
justify-content:center;

color:#888;

}

.history{

margin-top:18px;
background:#fff;
border-radius:20px;
box-shadow:0 5px 18px rgba(0,0,0,.08);

overflow:hidden;

}

.row{

display:flex;
justify-content:space-between;
padding:16px 18px;
border-bottom:1px solid #eee;

}

.row:last-child{

border-bottom:none;

}

</style>

</head>

<body>

<div class="header">

<a href="favourite.html" class="back">← Back</a>

</div>

<div class="hero">

<div id="vegEmoji" class="emoji">🥬</div>

<div id="vegName" class="name">Loading...</div>

<div>

<span id="todayPrice" class="price">₹0</span>

<span class="unit">/kg</span>

</div>

<div id="difference" class="change">
--
</div>

<div id="status" class="status">
Loading...
</div>

<div id="updated" class="updated">
--
</div>

</div>

<div class="grid">

<div class="card">
<h3>Yesterday</h3>
<p id="yesterday">--</p>
</div>

<div class="card">
<h3>This Week</h3>
<p id="weekPrice">--</p>
</div>

<div class="card">
<h3>This Month</h3>
<p id="monthPrice">--</p>
</div>

<div class="card">
<h3>Average</h3>
<p id="averagePrice">--</p>
</div>

<div class="card">
<h3>Highest</h3>
<p id="highestPrice">--</p>
</div>

<div class="card">
<h3>Lowest</h3>
<p id="lowestPrice">--</p>
</div>

</div>

<div class="section">

<h2>Price Trend</h2>

<div class="chart" id="chart">

Chart Coming...

</div>

</div>

<div class="section">

<h2>Price History</h2>

<div class="history" id="history">

<div class="row">

<span>Loading...</span>

</div>

</div>

</div>

<script src="js/vegetable.js"></script>

</body>
</html>
