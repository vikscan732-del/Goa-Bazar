<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Add Product</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f2f7f2;
margin:0;
padding:20px;
}
h2{
text-align:center;
color:#0b7a19;
}
input,select{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:8px;
font-size:16px;
}
button{
width:100%;
padding:14px;
background:#0b7a19;
color:#fff;
border:none;
border-radius:8px;
font-size:17px;
font-weight:bold;
cursor:pointer;
}
#msg{
margin-top:15px;
text-align:center;
font-weight:bold;
color:green;
}
</style>
</head>
<body>

<h2>Add Product</h2>

<input id="name" placeholder="Product Name">

<select id="category">
<option>Supari</option>
<option>Coconut</option>
<option>Cashew</option>
<option>Mango</option>
<option>Vegetables</option>
<option>Other</option>
</select>

<input id="price" type="number" placeholder="Today's Price (₹)">

<input id="image" placeholder="Image URL (GitHub image link)">

<button onclick="saveProduct()">Save Product</button>

<p id="msg"></p>

</body>
</html>
