<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Goa Bazar Admin</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f6f9;
padding:20px;
}

h1{
color:#2e7d32;
margin-bottom:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:15px;
margin-bottom:25px;
}

.card{
background:#fff;
border-radius:12px;
padding:20px;
text-align:center;
box-shadow:0 2px 8px rgba(0,0,0,.1);
}

.card h2{
font-size:32px;
color:#2e7d32;
margin-bottom:8px;
}

.card p{
color:#555;
}

.buttons{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
}

.btn{
display:block;
text-decoration:none;
background:#2e7d32;
color:#fff;
padding:15px;
text-align:center;
border-radius:10px;
font-size:17px;
font-weight:bold;
}

.btn:hover{
background:#1b5e20;
}
</style>

</head>
<body>

<h1>Goa Bazar Admin</h1>

<div class="grid">

<div class="card">
<h2 id="totalProducts">0</h2>
<p>Total Products</p>
</div>

<div class="card">
<h2 id="hiddenProducts">0</h2>
<p>Hidden Products</p>
</div>

<div class="card">
<h2 id="todayUpdates">0</h2>
<p>Today's Updates</p>
</div>

</div>

<div class="buttons">

<a class="btn" href="add-product.html">
➕ Add Product
</a>

<a class="btn" href="manage-products.html">
📦 Manage Products
</a>

<a class="btn" href="settings.html">
⚙ Website Settings
</a>

<a class="btn" href="login.html">
🚪 Logout
</a>

</div>

<script type="module" src="../js/dashboard.js"></script>

  

</body>
</html>
