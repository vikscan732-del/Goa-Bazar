<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Goa Bazar Admin</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f2f7f2;
}

header{
background:#0b7a19;
color:#fff;
padding:18px;
font-size:22px;
font-weight:bold;
text-align:center;
}

.container{
padding:20px;
}

.card{
background:#fff;
border-radius:12px;
padding:18px;
margin-bottom:15px;
box-shadow:0 3px 10px rgba(0,0,0,.1);
}

.card h2{
font-size:18px;
margin-bottom:8px;
}

.value{
font-size:28px;
font-weight:bold;
color:#0b7a19;
}

.btn{
display:block;
width:100%;
padding:15px;
margin-top:12px;
border:none;
border-radius:10px;
background:#0b7a19;
color:#fff;
font-size:17px;
font-weight:bold;
cursor:pointer;
}

.logout{
background:#d32f2f;
}
</style>
</head>

<body>

<header>
Goa Bazar Admin
</header>

<div class="container">

<div class="card">
<h2>Total Products</h2>
<div class="value" id="totalProducts">0</div>
</div>

<div class="card">
<h2>Today's Updates</h2>
<div class="value">0</div>
</div>

<button class="btn" onclick="location.href='add-product.html'">
➕ Add Product
</button>

<button class="btn" onclick="location.href='manage-products.html'">
📦 Manage Products
</button>

<button class="btn">
⚙ Website Settings
</button>

<button class="btn logout">
Logout
</button>

</div>

</body>
</html>
