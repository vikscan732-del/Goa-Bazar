<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Edit Product</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f5f7f5;
padding:20px;
}

.card{
max-width:500px;
margin:auto;
background:#fff;
padding:20px;
border-radius:12px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

h2{
margin-bottom:20px;
color:#1b5e20;
}

input{
width:100%;
padding:12px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:8px;
font-size:16px;
}

button{
width:100%;
padding:12px;
background:#1b5e20;
color:#fff;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}
</style>

</head>

<body>

<div class="card">

<h2>Edit Product</h2>

<input id="name" placeholder="Product Name">

<input id="price" type="number" placeholder="Price">

<input id="category" placeholder="Category">

<input id="image" placeholder="Image URL">

<button onclick="saveProduct()">
Save Changes
</button>

</div>

<script type="module" src="../js/edit-product.js"></script>

</body>
</html>
