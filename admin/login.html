<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Goa Bazar Admin Login</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-box{
width:340px;
background:#fff;
padding:30px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,.15);
text-align:center;
}

h1{
color:#0b7a19;
margin-bottom:10px;
}

p{
color:#666;
margin-bottom:25px;
}

input{
width:100%;
padding:14px;
margin-bottom:15px;
border:1px solid #ddd;
border-radius:10px;
font-size:16px;
}

button{
width:100%;
padding:14px;
background:#0b7a19;
color:white;
border:none;
border-radius:10px;
font-size:17px;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#096615;
}

#msg{
margin-top:15px;
color:red;
font-size:14px;
}

.footer{
margin-top:20px;
font-size:13px;
color:#888;
}
</style>
</head>

<body>

<div class="login-box">

<h1>Goa Bazar</h1>

<p>Admin Login</p>

<input
type="email"
id="email"
placeholder="Email">

<input
type="password"
id="password"
placeholder="Password">

<button onclick="login()">
Login
</button>

<div id="msg"></div>

<div class="footer">
Developer<br>
<b>Vikrant Naik</b>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {
getAuth,
signInWithEmailAndPassword
}
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

const firebaseConfig = {

apiKey:"AIzaSyCFSlBW8aPT5HMwrU3YkurK9qSO4irwwew",

authDomain:"goa-bazar.firebaseapp.com",

projectId:"goa-bazar",

appId:"1:340956541301:web:be546dad2992f285b9233c"

};

const app=initializeApp(firebaseConfig);

const auth=getAuth(app);

window.login=()=>{

const email=document.getElementById("email").value;

const password=document.getElementById("password").value;

signInWithEmailAndPassword(auth,email,password)

.then(()=>{

window.location="dashboard.html";

})

.catch(()=>{

document.getElementById("msg").innerHTML="Invalid Email or Password";

});

};

</script>

</body>
</html>
